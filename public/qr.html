<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - منيو المدينة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            max-width: 420px;
            width: 100%;
        }
        .logo-area {
            margin-bottom: 20px;
        }
        .restaurant-name {
            font-size: 28px;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .restaurant-sub {
            font-size: 13px;
            color: #888;
            font-weight: 400;
        }
        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            border-radius: 99px;
            margin: 16px auto;
        }
        .scan-text {
            font-size: 13px;
            color: #555;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 16px;
            display: inline-block;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border: 2px solid #f1f5f9;
            margin-bottom: 20px;
        }
        #qr-canvas {
            display: block;
            border-radius: 8px;
        }
        .url-badge {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 11px;
            color: #475569;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 20px;
            direction: ltr;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            font-size: 14px;
            padding: 14px 32px;
            border-radius: 14px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(245,158,11,0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245,158,11,0.4);
        }
        .footer-note {
            margin-top: 16px;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            <div class="restaurant-name">🍽️ منيو المدينة</div>
            <div class="restaurant-sub">امسح الكود للاطلاع على القائمة</div>
        </div>
        <div class="divider"></div>
        <p class="scan-text">📱 امسح بكاميرا هاتفك للطلب مباشرة</p>

        <div class="qr-container">
            <canvas id="qr-canvas"></canvas>
        </div>

        <div class="url-badge" id="url-display">جاري توليد الرابط...</div>

        <button class="download-btn" onclick="downloadQR()">⬇️ تحميل QR Code</button>

        <p class="footer-note">يمكن طباعة هذا الكود ووضعه على الطاولات</p>
    </div>

    <!-- QR Code library (pure JS, no external dependencies needed for generation) -->
    <script>
    // Minimal QR Code generator (Reed-Solomon + matrix encoding)
    // Using qrcode-generator library via CDN
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const URL = window.location.origin + '/menu';
        document.getElementById('url-display').textContent = URL;
        const canvas = document.getElementById('qr-canvas');
        const size = 260;

        const qr = new QRCode(document.createElement('div'), {
            text: URL,
            width: size,
            height: size,
            colorDark: '#0f172a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // Wait for QR to render then copy to our canvas
        setTimeout(() => {
            const qrImg = qr._el.querySelector('img') || qr._el.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;

            if (qrImg.tagName === 'CANVAS') {
                ctx.drawImage(qrImg, 0, 0);
            } else {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = qrImg.src;
            }
        }, 100);

        function downloadQR() {
            const link = document.createElement('a');
            link.download = 'almadina-menu-qr.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
